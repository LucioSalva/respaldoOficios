# =============================================================================
# Apache Alias - Respaldo de Oficios bajo subcarpeta /oficios
# Tesoreria Municipal STIyC
#
# La aplicacion convive con otras apps en el mismo Apache/puerto 8080.
# NO crea VirtualHost dedicado, NO cambia DocumentRoot, NO usa hostname propio.
#
# Como instalar:
#   1) Copiar este archivo a:
#        C:/laragon/etc/apache2/sites-enabled/apache-oficios-subpath.conf
#      O incluirlo desde httpd.conf con:
#        Include conf/extra/apache-oficios-subpath.conf
#   2) Verificar en httpd.conf:
#        Listen 8080
#        LoadModule rewrite_module ...
#        LoadModule alias_module   ...
#        LoadModule headers_module ...
#   3) Reiniciar Apache.
#   4) Probar: http://187.174.221.162:8080/oficios
#
# IMPORTANTE: el Alias apunta directamente a src/public, por lo que la raiz
# del repo (C:/laragon/www/oficios) NO queda expuesta. Carpetas internas
# (sql, storage, vendor, deploy, backups, paquete_produccion) quedan fuera
# del DocumentRoot del Alias.
# =============================================================================

Alias /oficios "C:/laragon/www/oficios/src/public"

<Directory "C:/laragon/www/oficios/src/public">
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted

    # Front controller. RewriteBase /oficios/ se define en el .htaccess local
    # de src/public para que las URL bonitas funcionen detras del Alias.
    DirectoryIndex index.php

    <IfModule mod_headers.c>
        Header always set X-Frame-Options         "SAMEORIGIN"
        Header always set X-Content-Type-Options  "nosniff"
        Header always set X-XSS-Protection        "1; mode=block"
        Header always set Referrer-Policy         "strict-origin-when-cross-origin"
        Header always set Permissions-Policy      "geolocation=(), microphone=(), camera=()"
    </IfModule>
</Directory>

# Defensa en profundidad: aunque el Alias apunta a src/public, bloqueamos por
# nombre cualquier intento de acceder por URL a carpetas internas del repo
# (en caso de que otra app o un Alias mal configurado expusiera la raiz).
<DirectoryMatch "C:/laragon/www/oficios/(sql|storage|backups|tests|tools|deploy|docker|vendor|paquete_produccion)">
    Require all denied
</DirectoryMatch>

# Bloquear archivos sensibles donde sea que esten en el filesystem del repo.
<FilesMatch "\.(env|sql|log|sh|md|yml|yaml|json|ini|bak|swp|git|rar|zip)$">
    Require all denied
</FilesMatch>

# Excepcion explicita: permitir composer.json publico es indeseable, ya esta
# bloqueado por la regla anterior. No hace falta excepcion.
