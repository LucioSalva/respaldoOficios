# =============================================================================
# Apache Alias - Respaldo de Oficios bajo subcarpeta /oficios (PHP puro)
# Tesoreria Municipal STIyC
#
# CONFIGURACION OFICIAL para el layout PHP puro tradicional con la siguiente
# jerarquia (importante: NO se expone la raiz del repo, solo public/):
#
#   C:/laragon/www/oficios/
#     +- public/        <-- DocumentRoot del Alias
#     +- app/           <-- codigo de la app, fuera del webroot
#     +- storage/       <-- logs, cache (jamas web)
#     +- uploads/       <-- archivos subidos (jamas web)
#     +- sql/           <-- migraciones (jamas web)
#     +- deploy/        <-- scripts y configs (jamas web)
#     +- backups/       <-- backups del repo (jamas web)
#     +- .env           <-- bloqueado a nivel filesystem
#
# COMO INSTALAR
# -------------
#   1) Copiar este archivo a:
#        C:/laragon/etc/apache2/sites-enabled/apache-alias-oficios.conf
#      o incluirlo desde httpd.conf con:
#        Include conf/extra/apache-alias-oficios.conf
#   2) Verificar en httpd.conf:
#        Listen 8080
#        LoadModule rewrite_module ...
#        LoadModule alias_module   ...
#        LoadModule headers_module ...
#   3) Reiniciar Apache.
#   4) Probar: http://187.174.221.162:8080/oficios
#
# La raiz del repo NO queda expuesta. El DirectoryMatch al final niega
# cualquier intento de acceder a carpetas internas si otra config las
# llegara a publicar por error.
# =============================================================================

Alias /oficios "C:/laragon/www/oficios/public"

<Directory "C:/laragon/www/oficios/public">
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted

    DirectoryIndex index.php

    <IfModule mod_headers.c>
        Header always set X-Frame-Options         "SAMEORIGIN"
        Header always set X-Content-Type-Options  "nosniff"
        Header always set X-XSS-Protection        "1; mode=block"
        Header always set Referrer-Policy         "strict-origin-when-cross-origin"
        Header always set Permissions-Policy      "geolocation=(), microphone=(), camera=()"
    </IfModule>
</Directory>

# Defensa en profundidad: cualquier ruta del filesystem que apunte a las
# carpetas internas del repo queda denegada, sin importar como llegue Apache.
<DirectoryMatch "C:/laragon/www/oficios/(app|sql|storage|uploads|deploy|backups|tests|tools|docker|vendor|paquete_produccion)">
    Require all denied
</DirectoryMatch>

# Bloquear archivos sensibles donde sea que esten en el filesystem del repo.
<FilesMatch "\.(env|sql|log|sh|md|yml|yaml|json|ini|bak|swp|git|rar|zip)$">
    Require all denied
</FilesMatch>
