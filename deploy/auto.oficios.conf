# =============================================================================
# VirtualHost Apache para Laragon - Respaldo de Oficios (Tesoreria Municipal STIyC)
# Puerto: 8080
# Ubicacion final en Laragon:
#   C:/laragon/etc/apache2/sites-enabled/auto.oficios.conf
#
# Requisitos en httpd.conf:
#   - Listen 8080 (lo agrega el script setup-laragon-oficios.ps1 si falta)
#   - LoadModule rewrite_module    -> activo
#   - LoadModule headers_module    -> activo (necesario para los Header set)
#
# URLs validas tras recargar Apache:
#   http://oficios.test:8080
#   http://187.174.221.162:8080
# =============================================================================

<VirtualHost *:8080>
    ServerName  oficios.test
    ServerAlias 187.174.221.162

    DocumentRoot "C:/laragon/www/oficios/src/public"

    <Directory "C:/laragon/www/oficios/src/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Bloquear acceso directo a directorios internos del proyecto
    <DirectoryMatch "C:/laragon/www/oficios/(sql|storage|backups|tests|tools|deploy|docker|vendor|paquete_produccion)">
        Require all denied
    </DirectoryMatch>

    # Tampoco se puede entrar al .env ni dumps que vivan en raiz
    <FilesMatch "\.(env|sql|log|sh|md|yml|yaml|json|ini|bak|swp|git|rar|zip)$">
        Require all denied
    </FilesMatch>

    # Headers de seguridad (requieren mod_headers)
    <IfModule mod_headers.c>
        Header always set X-Frame-Options         "SAMEORIGIN"
        Header always set X-Content-Type-Options  "nosniff"
        Header always set X-XSS-Protection        "1; mode=block"
        Header always set Referrer-Policy         "strict-origin-when-cross-origin"
        Header always set Permissions-Policy      "geolocation=(), microphone=(), camera=()"
    </IfModule>

    # Logs - se intentan ambas rutas tipicas de Laragon, ${SRVROOT} resuelve.
    ErrorLog  "${SRVROOT}/logs/oficios-error.log"
    CustomLog "${SRVROOT}/logs/oficios-access.log" combined
</VirtualHost>
