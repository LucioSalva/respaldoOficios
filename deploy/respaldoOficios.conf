# =============================================================================
# VirtualHost Apache para Laragon - Respaldo de Oficios
# Puerto: 8080
# Ubicacion en Laragon: C:\laragon\etc\apache2\sites-enabled\auto.respaldoOficios.conf
# =============================================================================
#
# Requisitos previos en Laragon:
#   1) Apache escuchando en puerto 8080 (Menu -> Apache -> httpd.conf -> Listen 8080)
#   2) Extensiones PHP activadas: pdo_pgsql, pgsql, zip, opcache, openssl, mbstring
#   3) Modulos Apache habilitados: rewrite, headers
#
# Acceso despues de recargar Apache:
#   http://respaldo-oficios.test:8080
#   o bien (si Laragon auto-hosts sin puerto) http://respaldo-oficios.test
# =============================================================================

<VirtualHost *:8080>
    ServerName  respaldo-oficios.test
    ServerAlias www.respaldo-oficios.test
    DocumentRoot "C:/laragon/www/respaldoOficios/src/public"

    <Directory "C:/laragon/www/respaldoOficios/src/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Bloquear acceso directo a directorios sensibles (src, sql, uploads, storage)
    <DirectoryMatch "C:/laragon/www/respaldoOficios/(sql|storage|backups|tests|tools|docker)">
        Require all denied
    </DirectoryMatch>

    # Logs Apache (opcional, ajustar ruta si se desea persistencia propia)
    ErrorLog  "${SRVROOT}/logs/respaldoOficios-error.log"
    CustomLog "${SRVROOT}/logs/respaldoOficios-access.log" combined

    # Headers de seguridad (complementa .htaccess de src/public)
    Header always set X-Frame-Options         "SAMEORIGIN"
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-XSS-Protection        "1; mode=block"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"
</VirtualHost>
